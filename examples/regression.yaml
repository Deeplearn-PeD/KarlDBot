problem_name: 'Análise de regressão'
llm_model: 'qwen2.5-coder'
data_source: 'examples/data.csv.gz'
description: 'Please implement a regression model to explore the effects of climate variables on average precipitation(precip_med).
The available features are minimum temperature(temp_min), mean temperature (temp_med), maximum temperature(temp_max),
minimum humidity(umid_min), maximum humidity(umid_max), Maximum Atmospheric pressure(pressao_max) and minimum atmospheric presure(pressao_min).
Use the city(geoodigo) as a random effect.'